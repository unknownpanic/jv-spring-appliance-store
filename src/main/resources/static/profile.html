<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — ApplianceStore</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">🔌 ApplianceStore</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="appliances.html" data-i18n="nav.appliances">Appliances</a>
      <a href="orders.html" class="auth-only" data-i18n="nav.orders">Orders</a>
      <a href="clients.html" class="employee-only" data-i18n="nav.clients">Clients</a>
      <a href="employees.html" class="employee-only" data-i18n="nav.employees">Employees</a>
      <a href="manufacturers.html" class="employee-only" data-i18n="nav.manufacturers">Manufacturers</a>
    </div>
    <div class="nav-actions">
      <button class="btn-lang" id="langToggle">EN</button>
      <div class="auth-only" id="userInfo">
        <span id="userEmail"></span>
        <span id="userRole" class="badge"></span>
        <button onclick="logout()" data-i18n="nav.logout">Logout</button>
      </div>
    </div>
    <button class="burger" id="burger">☰</button>
  </nav>

  <main class="container">
    <div class="card-info" style="max-width: 500px; margin: 0 auto; display: block;">
      <div class="page-header">
        <h1 data-i18n="auth.profile">My Profile</h1>
      </div>
      <div id="errorBox" class="error-box hidden"></div>
      <div id="successBox" class="success-box hidden"></div>

      <form id="profileForm" class="modal-form">
        <div class="field">
          <label data-i18n="auth.email">Email</label>
          <input type="email" id="profileEmail" disabled style="background: #f1f5f9; cursor: not-allowed;" />
        </div>
        <div class="field">
          <label data-i18n="auth.name">Full Name</label>
          <input type="text" id="profileName" required/>
        </div>
        <div class="field">
          <label data-i18n="clients.card">Card</label>
          <input type="text" id="profileCard" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19"/>
        </div>
        <button type="submit" class="btn-primary full" id="submitBtn" style="margin-top: 10px;" data-i18n="common.save">
          Save
        </button>
      </form>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script>
    initNav();
    applyLang();

    if (!isLoggedIn() || isEmployee()) {
        window.location.href = 'index.html';
    }

    const cardInput = document.getElementById('profileCard');
    cardInput.addEventListener('input', function (e) {
      this.value = this.value.replace(/\D/g, '').replace(/(\d{4})(?=\d)/g, '$1-').slice(0, 19);
    });

    async function loadProfile() {
      try {
        const data = await apiFetch('/clients/me');
        document.getElementById('profileEmail').value = data.email || '';
        document.getElementById('profileName').value = data.name || '';
        document.getElementById('profileCard').value = data.card || '';
      } catch (err) {
        showError(err.message);
      }
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      hideError();
      document.getElementById('successBox').classList.add('hidden');

      const name = document.getElementById('profileName').value;
      const email = document.getElementById('profileEmail').value;
      const card = cardInput.value;

      const cardRegex = /^\d{4}-\d{4}-\d{4}-\d{4}$/;
      if (card && !cardRegex.test(card)) {
        showError(getLang() === 'uk' ? 'Невірний формат картки.' : 'Invalid card format.');
        return;
      }

      btn.disabled = true;
      try {
        await apiFetch('/clients/me', {
          method: 'PUT',
          body: JSON.stringify({ name, email, card })
        });

        document.getElementById('successBox').textContent = getLang() === 'uk' ? 'Профіль успішно оновлено!' : 'Profile updated successfully!';
        document.getElementById('successBox').classList.remove('hidden');
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
      }
    });

    loadProfile();
  </script>
</body>
</html>
