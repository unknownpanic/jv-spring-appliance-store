<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appliances — ApplianceStore</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">🔌 ApplianceStore</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="appliances.html" class="active" data-i18n="nav.appliances">Appliances</a>
      <a href="orders.html" class="auth-only" data-i18n="nav.orders">Orders</a>
      <a href="clients.html" class="employee-only" data-i18n="nav.clients">Clients</a>
      <a href="employees.html" class="employee-only" data-i18n="nav.employees">Employees</a>
      <a href="manufacturers.html" class="employee-only" data-i18n="nav.manufacturers">Manufacturers</a>
    </div>
    <div class="nav-actions">
      <button class="btn-lang" id="langToggle">EN</button>
      <div class="auth-only" id="userInfo">
        <span id="userEmail"></span>
        <span id="userRole" class="badge"></span>
        <button onclick="logout()" data-i18n="nav.logout">Logout</button>
      </div>
      <div class="guest-only" id="guestActions">
        <a href="login.html" class="btn-outline" data-i18n="nav.login">Login</a>
      </div>
    </div>
    <button class="burger" id="burger">☰</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1 data-i18n="appliances.title">Appliances</h1>
      <button class="btn-primary employee-only" id="addBtn" data-i18n="appliances.add">Add Appliance</button>
    </div>

    <form class="search-form" id="searchForm">
      <div class="search-input-wrap">
        <input type="text" id="searchInput" data-i18n-placeholder="appliances.searchPlaceholder" placeholder="Search..."/>
      </div>

      <select id="sortSelect" class="btn-outline">
        <option value="id,asc" data-i18n="sort.default">Default</option>
        <option value="price,asc" data-i18n="sort.priceAsc">Price: Low to High</option>
        <option value="price,desc" data-i18n="sort.priceDesc">Price: High to Low</option>
      </select>

      <button type="submit" class="btn-primary" data-i18n="common.search">Search</button>
      <button type="button" class="btn-outline" id="clearSearch" data-i18n="common.clear">Clear</button>
    </form>

    <div id="errorBox" class="error-box hidden"></div>
    <div id="listContainer"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Appliance</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div id="modalErrorBox" class="error-box hidden"></div>
      <form id="itemForm" class="modal-form">
        <div class="field"><label data-i18n="appliances.name">Name</label><input type="text" name="name" required/></div>
        <div class="field">
            <label data-i18n="appliances.category">Category</label>
            <select name="category" class="btn-outline" style="background: #fff;" required>
                <option value="BIG">BIG</option>
                <option value="SMALL">SMALL</option>
            </select>
        </div>
        <div class="field"><label data-i18n="appliances.model">Model</label><input type="text" name="model" required/></div>
        <div class="field"><label>Manufacturer ID</label><input type="number" name="manufacturerId" required min="1"/></div>
        <div class="field">
            <label data-i18n="appliances.powerType">Power Type</label>
            <select name="powerType" class="btn-outline" style="background: #fff;" required>
                <option value="AC220">AC220</option>
                <option value="AC110">AC110</option>
                <option value="ACCUMULATOR">ACCUMULATOR</option>
            </select>
        </div>
        <div class="field"><label data-i18n="appliances.power">Power (W)</label><input type="number" name="power" required min="0"/></div>
        <div class="field"><label data-i18n="appliances.price">Price</label><input type="number" name="price" required min="0" step="0.01"/></div>
        <div class="field"><label data-i18n="appliances.characteristic">Characteristic</label><input type="text" name="characteristic"/></div>
        <div class="field"><label data-i18n="appliances.description">Description</label><textarea name="description"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="modalCancel" data-i18n="common.cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="modalSubmit" data-i18n="common.save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal confirm-modal">
      <p id="confirmMsg"></p>
      <div class="modal-actions">
        <button class="btn-outline" id="confirmNo" data-i18n="common.cancel">Cancel</button>
        <button class="btn-danger" id="confirmYes" data-i18n="common.yes">Yes</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="crud.js"></script>
  <script>
    initNav();
    applyLang();

    let currentPage = 0;
    let currentSearch = '';
    let currentSort = 'id,asc';
    let editId = null;

    document.getElementById('sortSelect').addEventListener('change', (e) => {
      currentSort = e.target.value;
      loadItems(0);
    });

    document.getElementById('langToggle').addEventListener('click', () => {
      const select = document.getElementById('sortSelect');
      Array.from(select.options).forEach(opt => {
        const key = opt.getAttribute('data-i18n');
        if (key) opt.textContent = t(key);
      });
    });

    document.getElementById('searchForm').addEventListener('submit', (e) => {
      e.preventDefault();
      currentSearch = document.getElementById('searchInput').value;
      loadItems(0);
    });

    document.getElementById('clearSearch').addEventListener('click', () => {
      currentSearch = '';
      currentSort = 'id,asc';
      document.getElementById('searchInput').value = '';
      document.getElementById('sortSelect').value = 'id,asc';
      loadItems(0);
    });

    // Відновлена чиста логіка завантаження
    async function loadItems(page = 0) {
      currentPage = page;
      showLoading('listContainer');
      hideError();
      try {
        let endpoint;
        if (currentSearch) {
          endpoint = `/appliances/search?names=${encodeURIComponent(currentSearch)}&page=${page}&size=10&sort=${currentSort}`;
        } else {
          endpoint = `/appliances?page=${page}&size=10&sort=${currentSort}`;
        }
        
        const data = await apiFetch(endpoint);
        renderList(data.content || [], data.totalPages || 0, page);
      } catch (err) {
        showError(err.message);
      }
    }

    function renderList(items, totalPages, page) {
      const container = document.getElementById('listContainer');
      if (!items.length) { container.innerHTML = `<p class="no-data" data-i18n="common.noData">${t('common.noData')}</p>`; renderPagination(0,0); return; }
      container.innerHTML = items.map(item => `
        <div class="list-item" data-id="${item.id}">
          <div class="list-item-main" onclick="toggleExpand(${item.id})">
            <span class="item-id">#${item.id}</span>
            <div class="item-info">
              <span class="item-name">${item.name}</span>
              <span class="item-sub"><span class="badge badge-blue">${item.category}</span> · ${item.model}</span>
            </div>
            <div class="item-right">
              <span class="item-price">$${item.price}</span>
              ${isEmployee() ? `
                <button class="btn-icon" onclick="event.stopPropagation(); openEdit(${item.id})" title="${t('common.edit')}">✏️</button>
                <button class="btn-icon danger" onclick="event.stopPropagation(); confirmDelete(${item.id})" title="${t('common.delete')}">🗑️</button>
              ` : ''}
              <span class="expand-icon">▾</span>
            </div>
          </div>
          <div class="list-item-detail hidden" id="detail-${item.id}">
            <div class="detail-grid">
              <div><span class="detail-label">${t('appliances.powerType')}</span>${item.powerType || '—'}</div>
              <div><span class="detail-label">${t('appliances.power')}</span>${item.power ?? '—'}</div>
              <div><span class="detail-label">Manufacturer ID</span>${item.manufacturerId || '—'}</div>
              <div class="full"><span class="detail-label">${t('appliances.characteristic')}</span>${item.characteristic || '—'}</div>
              <div class="full"><span class="detail-label">${t('appliances.description')}</span>${item.description || '—'}</div>
            </div>
          </div>
        </div>
      `).join('');
      renderPagination(page, totalPages);
    }

    function toggleExpand(id) {
      const el = document.getElementById('detail-' + id);
      el.classList.toggle('hidden');
    }

    function openEdit(id) {
      const item = document.querySelector(`[data-id="${id}"]`);
      editId = id;
      document.getElementById('modalTitle').textContent = t('appliances.edit');
      const form = document.getElementById('itemForm');
      
      apiFetch(`/appliances/${id}`).then(data => {
        form.name.value = data.name || '';
        form.category.value = data.category || 'BIG';
        form.model.value = data.model || '';
        form.manufacturerId.value = data.manufacturerId || '';
        form.powerType.value = data.powerType || 'AC220';
        form.power.value = data.power ?? '';
        form.price.value = data.price ?? '';
        form.characteristic.value = data.characteristic || '';
        form.description.value = data.description || '';
        openModal();
      }).catch(err => showError(err.message));
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      editId = null;
      document.getElementById('modalTitle').textContent = t('appliances.add');
      document.getElementById('itemForm').reset();
      openModal();
    });

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const body = {
        name: form.name.value, 
        category: form.category.value, 
        model: form.model.value,
        manufacturerId: Number(form.manufacturerId.value), 
        powerType: form.powerType.value,
        power: Number(form.power.value), 
        price: Number(form.price.value),
        characteristic: form.characteristic.value, 
        description: form.description.value
      };
      const btn = document.getElementById('modalSubmit');
      btn.disabled = true;
      try {
        if (editId) await apiFetch(`/appliances/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
        else await apiFetch('/appliances', { method: 'POST', body: JSON.stringify(body) });
        closeModal();
        loadItems(currentPage);
      } catch (err) {
        document.getElementById('modalErrorBox').textContent = err.message;
        document.getElementById('modalErrorBox').classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    });

    function confirmDelete(id) {
      showConfirm(getLang() === 'uk' ? 'Видалити цю техніку?' : 'Delete this appliance?', async () => {
        await apiFetch(`/appliances/${id}`, { method: 'DELETE' });
        loadItems(currentPage);
      });
    }

    loadItems(0);
  </script>
</body>
</html>
