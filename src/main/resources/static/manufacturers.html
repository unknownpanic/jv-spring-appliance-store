<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manufacturers — ApplianceStore</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">🔌 ApplianceStore</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html" data-i18n="nav.home">Home</a>
      <a href="appliances.html" data-i18n="nav.appliances">Appliances</a>
      <a href="orders.html" class="auth-only" data-i18n="nav.orders">Orders</a>
      <a href="clients.html" class="employee-only" data-i18n="nav.clients">Clients</a>
      <a href="employees.html" class="employee-only" data-i18n="nav.employees">Employees</a>
      <a href="manufacturers.html" class="employee-only active" data-i18n="nav.manufacturers">Manufacturers</a>
    </div>
    <div class="nav-actions">
      <button class="btn-lang" id="langToggle">EN</button>
      <div class="auth-only" id="userInfo">
        <span id="userEmail"></span>
        <span id="userRole" class="badge"></span>
        <button onclick="logout()" data-i18n="nav.logout">Logout</button>
      </div>
    </div>
    <button class="burger" id="burger">☰</button>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1 data-i18n="manufacturers.title">Manufacturers</h1>
      <button class="btn-primary" id="addBtn" data-i18n="manufacturers.add">Add Manufacturer</button>
    </div>
    <div id="errorBox" class="error-box hidden"></div>
    <div id="listContainer"></div>
  </main>

  <div class="modal-overlay hidden" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div id="modalErrorBox" class="error-box hidden"></div>
      <form id="itemForm" class="modal-form">
        <div class="field"><label data-i18n="manufacturers.name">Name</label><input type="text" name="name" required/></div>
        <div class="modal-actions">
          <button type="button" class="btn-outline" id="modalCancel" data-i18n="common.cancel">Cancel</button>
          <button type="submit" class="btn-primary" id="modalSubmit" data-i18n="common.save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay hidden" id="confirmModal">
    <div class="modal confirm-modal">
      <p id="confirmMsg"></p>
      <div class="modal-actions">
        <button class="btn-outline" id="confirmNo" data-i18n="common.cancel">Cancel</button>
        <button class="btn-danger" id="confirmYes" data-i18n="common.yes">Yes</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="crud.js"></script>
  <script>
    initNav();
    requireEmployee();
    applyLang();

    let editId = null;

    async function loadItems() {
      showLoading('listContainer');
      hideError();
      try {
        const data = await apiFetch('/manufacturers');
        renderCards(data || []);
      } catch (err) { showError(err.message); }
    }

    function renderCards(items) {
      const container = document.getElementById('listContainer');
      if (!items.length) { container.innerHTML = `<p class="no-data">${t('common.noData')}</p>`; return; }
      container.innerHTML = `<div class="mfr-grid">${items.map(item => `
        <div class="mfr-card">
          <div class="mfr-icon">🏭</div>
          <div class="mfr-info">
            <span class="mfr-name">${item.name}</span>
            <span class="mfr-id">#${item.id}</span>
          </div>
          <div class="mfr-actions">
            <button class="btn-icon" onclick="openEdit(${item.id}, '${escStr(item.name)}')">✏️</button>
            <button class="btn-icon danger" onclick="confirmDelete(${item.id})">🗑️</button>
          </div>
        </div>`).join('')}</div>`;
    }

    function openEdit(id, name) {
      editId = id;
      document.getElementById('modalTitle').textContent = t('manufacturers.edit');
      document.getElementById('itemForm').name.value = name;
      openModal();
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      editId = null;
      document.getElementById('modalTitle').textContent = t('manufacturers.add');
      document.getElementById('itemForm').reset();
      openModal();
    });

    document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = e.target.name.value;
      const btn = document.getElementById('modalSubmit');
      btn.disabled = true;
      try {
        if (editId) await apiFetch(`/manufacturers/${editId}`, { method: 'PUT', body: JSON.stringify({ name }) });
        else await apiFetch('/manufacturers', { method: 'POST', body: JSON.stringify({ name }) });
        closeModal();
        loadItems();
      } catch (err) {
        document.getElementById('modalErrorBox').textContent = err.message;
        document.getElementById('modalErrorBox').classList.remove('hidden');
      } finally { btn.disabled = false; }
    });

    function confirmDelete(id) {
      showConfirm(getLang() === 'uk' ? 'Видалити цього виробника?' : 'Delete this manufacturer?', async () => {
        await apiFetch(`/manufacturers/${id}`, { method: 'DELETE' });
        loadItems();
      });
    }

    loadItems();
  </script>
</body>
</html>
